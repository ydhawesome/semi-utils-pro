<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
                            400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
                            800: '#075985', 900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0/src/toastify.min.css" crossorigin="anonymous">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js@1.12.0" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js" crossorigin="anonymous"></script>

    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        [x-cloak] { display: none !important; }
        .step-num { width: 28px; height: 28px; }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 min-h-screen text-slate-800"
      x-data="app()" x-init="init()" x-cloak>

<!-- 顶部 -->
<header class="sticky top-0 z-20 backdrop-blur bg-white/80 border-b border-slate-200/60">
    <div class="max-w-4xl mx-auto px-5 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-primary-500 to-primary-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary-500/30">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <div>
                <h1 class="font-bold text-lg tracking-tight">{{ title }}</h1>
                <p class="text-xs text-slate-400">给照片一键添加精美水印</p>
            </div>
        </div>
        <span class="text-xs px-2.5 py-1 rounded-full font-medium bg-slate-100 text-slate-500"
              x-text="cloudMode ? '云端版' : '本地版'"></span>
    </div>
</header>

<main class="max-w-4xl mx-auto px-5 py-8 space-y-6">

    <!-- ============ 结果页 ============ -->
    <template x-if="view === 'done'">
        <div class="space-y-6 animate-[fadeIn_.3s_ease-out]">
            <div class="text-center py-4">
                <div class="w-16 h-16 mx-auto mb-3 rounded-full bg-emerald-100 flex items-center justify-center">
                    <svg class="w-9 h-9 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h2 class="text-xl font-bold">处理完成！</h2>
                <p class="text-sm text-slate-500 mt-1" x-text="`成功 ${progress.success} 张，跳过 ${progress.skipped} 张，失败 ${progress.failure} 张`"></p>
            </div>

            <div class="flex flex-wrap justify-center gap-3">
                <button @click="downloadZip()"
                        class="px-6 py-3 bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white rounded-xl font-semibold shadow-lg shadow-emerald-500/30 transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    打包下载全部 (ZIP)
                </button>
                <button @click="reset()"
                        class="px-6 py-3 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-xl font-semibold transition flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    再做一批
                </button>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <template x-for="(r, i) in results" :key="r.value">
                    <div class="group relative rounded-xl overflow-hidden border border-slate-200 bg-white shadow-sm">
                        <div class="aspect-square bg-slate-100 flex items-center justify-center overflow-hidden">
                            <img :src="thumbUrl(r.value)" loading="lazy" class="w-full h-full object-cover">
                        </div>
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <button @click="downloadOne(r.value)"
                                    class="px-4 py-2 bg-white/95 text-slate-800 rounded-lg text-sm font-medium shadow flex items-center gap-1.5">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                下载
                            </button>
                        </div>
                        <div class="px-2 py-1.5 text-xs text-slate-500 truncate" x-text="r.label"></div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- ============ 编辑页 ============ -->
    <template x-if="view === 'edit'">
    <div class="space-y-6">

        <!-- 步骤 1：上传 -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6">
            <div class="flex items-center gap-3 mb-4">
                <span class="step-num rounded-full bg-primary-500 text-white flex items-center justify-center font-bold text-sm shrink-0">1</span>
                <h2 class="font-bold text-lg">上传照片</h2>
                <span x-show="photos.length" class="text-sm text-slate-400" x-text="`已选 ${photos.length} 张`"></span>
            </div>

            <div @dragover.prevent="isDragging = true"
                 @dragleave.prevent="isDragging = false"
                 @drop.prevent="isDragging = false; uploadFiles($event.dataTransfer.files)"
                 :class="isDragging ? 'border-primary-400 bg-primary-50' : 'border-slate-300 hover:border-primary-300 hover:bg-slate-50'"
                 class="border-2 border-dashed rounded-xl py-10 px-4 text-center cursor-pointer transition"
                 @click="$refs.fileInput.click()">
                <input x-ref="fileInput" type="file" class="hidden" multiple
                       accept="image/jpeg,image/png,image/heic,image/heif,.heic,.heif,.jpg,.jpeg,.png"
                       @change="uploadFiles($event.target.files); $event.target.value=''">
                <svg class="w-12 h-12 mx-auto mb-3 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <p class="text-slate-600 font-medium" x-text="uploading ? '处理中…' : '点击选择，或将照片拖到这里'"></p>
                <p class="text-xs text-slate-400 mt-1">支持 JPG / PNG / HEIC（大图会自动压缩，保留拍摄参数）</p>
            </div>

            <!-- 缩略图网格 -->
            <div x-show="photos.length" class="grid grid-cols-3 sm:grid-cols-5 gap-3 mt-4">
                <template x-for="(p, i) in photos" :key="p.value">
                    <div class="group relative aspect-square rounded-lg overflow-hidden border border-slate-200 bg-slate-100">
                        <img :src="thumbUrl(p.value)" loading="lazy" class="w-full h-full object-cover">
                        <button @click="removePhoto(i)"
                                class="absolute top-1 right-1 w-6 h-6 rounded-full bg-black/60 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:bg-red-500"
                                title="移除">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </template>
            </div>
        </section>

        <!-- 步骤 2：选择样式 -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6">
            <div class="flex items-center gap-3 mb-4">
                <span class="step-num rounded-full bg-primary-500 text-white flex items-center justify-center font-bold text-sm shrink-0">2</span>
                <h2 class="font-bold text-lg">选择水印样式</h2>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                <template x-for="t in templates" :key="t">
                    <button @click="selectedTemplate = t"
                            :class="selectedTemplate === t ? 'border-primary-500 ring-2 ring-primary-500/30' : 'border-slate-200 hover:border-primary-300'"
                            class="text-left rounded-xl border-2 overflow-hidden bg-white transition relative">
                        <div class="aspect-[4/3] bg-slate-100 flex items-center justify-center overflow-hidden">
                            <template x-if="styleMeta(t).img">
                                <img :src="`/static/${styleMeta(t).img}.jpeg`" loading="lazy" class="w-full h-full object-cover">
                            </template>
                            <template x-if="!styleMeta(t).img">
                                <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            </template>
                        </div>
                        <div class="absolute top-2 right-2 w-6 h-6 rounded-full bg-primary-500 text-white items-center justify-center shadow"
                             :class="selectedTemplate === t ? 'flex' : 'hidden'">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
                        </div>
                        <div class="p-3">
                            <p class="font-semibold text-sm truncate" x-text="styleMeta(t).name || t"></p>
                            <p class="text-xs text-slate-400 mt-0.5 line-clamp-2" x-text="styleMeta(t).desc || '自定义模板'"></p>
                        </div>
                    </button>
                </template>
            </div>
        </section>

        <!-- 步骤 3：生成 -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6">
            <div class="flex items-center gap-3 mb-4">
                <span class="step-num rounded-full bg-primary-500 text-white flex items-center justify-center font-bold text-sm shrink-0">3</span>
                <h2 class="font-bold text-lg">生成</h2>
            </div>

            <!-- 画质选择 -->
            <div class="flex items-center gap-3 mb-5">
                <span class="text-sm text-slate-500 shrink-0">输出画质</span>
                <div class="flex gap-2">
                    <template x-for="opt in qualityOptions" :key="opt.value">
                        <button @click="quality = opt.value"
                                :class="quality === opt.value ? 'bg-primary-500 text-white border-primary-500' : 'bg-white text-slate-600 border-slate-200 hover:border-primary-300'"
                                class="px-4 py-1.5 rounded-lg border text-sm font-medium transition"
                                x-text="opt.label"></button>
                    </template>
                </div>
            </div>

            <!-- 进度（处理中） -->
            <div x-show="progress.active" class="mb-5">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-slate-600" x-text="progress.message || '处理中…'"></span>
                    <span class="text-sm font-bold text-primary-600" x-text="`${progress.percent}%`"></span>
                </div>
                <div class="h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-primary-500 to-primary-600 rounded-full transition-all duration-300"
                         :style="`width: ${progress.percent}%`"></div>
                </div>
            </div>

            <button @click="generate()" :disabled="!canStart"
                    class="w-full py-4 bg-gradient-to-r from-primary-500 to-primary-600 hover:from-primary-600 hover:to-primary-700 text-white rounded-xl font-bold text-lg shadow-lg shadow-primary-500/30 transition disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2">
                <template x-if="!progress.active">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                </template>
                <template x-if="progress.active">
                    <svg class="w-6 h-6 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                </template>
                <span x-text="progress.active ? '正在生成…' : '开始生成水印'"></span>
            </button>
            <p class="text-center text-xs text-slate-400 mt-2" x-show="!canStart && !progress.active"
               x-text="!photos.length ? '请先上传照片' : (!selectedTemplate ? '请选择一个水印样式' : '')"></p>
        </section>

        <p class="text-center text-xs text-slate-400 pt-2">
            照片仅用于本次处理，处理完即可下载。超过 4MB 的大图会在本地自动压缩后再上传（拍摄参数保留）。
        </p>
    </div>
    </template>
</main>

<script>
    // 模板（中文名）→ 预览图 / 友好描述
    const STYLE_META = {
        '标准水印':            { img: 'standard1',  name: '标准水印',   desc: '经典 EXIF 参数 + 相机品牌 Logo' },
        '标准水印2':           { img: 'standard2',  name: '标准水印 ·留白', desc: '圆角阴影留白，适合社交分享' },
        '尼康专用背景模糊':     { img: 'nikon_blur', name: '尼康 ·模糊', desc: '尼康风格，模糊背景衬底' },
        '背景模糊':            { img: 'blur',       name: '背景模糊',   desc: '参数居中，模糊背景' },
        '右下角参数':          { img: 'normal1',    name: '极简角标',   desc: '右下角小字参数，低调不抢镜' },
        '文件夹名+右下角参数':  { img: 'normal2',    name: '文件夹+时间', desc: '文件夹名称 + 拍摄时间' },
        'logo居中':           { img: 'center_logo',name: 'Logo 居中',  desc: '中心 Logo，四周自定义文字' },
    };

    // ===== 上传前压缩（保留 EXIF）=====
    // Vercel serverless 请求体上限约 4.5MB，超过会在边缘被拒（表现为 Failed to fetch）。
    // 这里在浏览器内把大图压到 4MB 以下，并用 piexifjs 把原图 EXIF 转移到压缩图，
    // 保证水印所需的相机参数（型号/光圈/快门/ISO）不丢失。
    const MAX_UPLOAD = 4 * 1024 * 1024;

    function fileToDataURL(file) {
        return new Promise((resolve, reject) => {
            const r = new FileReader();
            r.onload = () => resolve(r.result);
            r.onerror = reject;
            r.readAsDataURL(file);
        });
    }

    function loadImage(src) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = src;
        });
    }

    function dataURLtoBlob(dataUrl) {
        const [head, b64] = dataUrl.split(',');
        const mime = head.match(/:(.*?);/)[1];
        const bin = atob(b64);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        return new Blob([arr], { type: mime });
    }

    async function prepareForUpload(file) {
        // 已经够小，原样上传（完整保留画质与 EXIF）
        if (file.size <= MAX_UPLOAD) return file;

        const isJpeg = /jpe?g/i.test(file.type) || /\.jpe?g$/i.test(file.name);
        const isHeic = /hei[cf]/i.test(file.type) || /\.hei[cf]$/i.test(file.name);

        // 读取原图 EXIF（仅 JPEG 可读）
        let exifStr = '';
        let srcDataUrl;
        try {
            srcDataUrl = await fileToDataURL(file);
            if (isJpeg && window.piexif) {
                try { exifStr = piexif.dump(piexif.load(srcDataUrl)); } catch (e) { exifStr = ''; }
            }
        } catch (e) {
            throw new Error('读取文件失败');
        }

        // 浏览器通常无法把 HEIC 画到 canvas；过大的 HEIC 只能提示
        let img;
        try {
            img = await loadImage(srcDataUrl);
        } catch (e) {
            if (isHeic) throw new Error('HEIC 照片过大且无法在浏览器压缩，请改用本地版或先转成 JPG');
            throw new Error('无法解码图片');
        }

        const maxEdge = 4096;
        let baseScale = Math.max(img.width, img.height) > maxEdge ? maxEdge / Math.max(img.width, img.height) : 1;
        const qualities = [0.85, 0.78, 0.7, 0.6];
        let best = null;

        for (let pass = 0; pass < 4; pass++) {
            const scale = baseScale * Math.pow(0.75, pass);
            const cw = Math.max(1, Math.round(img.width * scale));
            const ch = Math.max(1, Math.round(img.height * scale));
            const canvas = document.createElement('canvas');
            canvas.width = cw; canvas.height = ch;
            canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
            for (const q of qualities) {
                let dataUrl = canvas.toDataURL('image/jpeg', q);
                if (exifStr) { try { dataUrl = piexif.insert(exifStr, dataUrl); } catch (e) {} }
                const blob = dataURLtoBlob(dataUrl);
                if (!best || blob.size < best.size) best = blob;
                if (blob.size <= MAX_UPLOAD) {
                    const name = file.name.replace(/\.(png|heic|heif)$/i, '.jpg');
                    return new File([blob], name, { type: 'image/jpeg' });
                }
            }
        }
        // 实在压不下去也用最小的那张
        const name = file.name.replace(/\.(png|heic|heif)$/i, '.jpg');
        return new File([best], name, { type: 'image/jpeg' });
    }

    function app() {
        return {
            cloudMode: false,
            view: 'edit',            // 'edit' | 'done'
            uploading: false,
            isDragging: false,
            sessionId: null,
            photos: [],              // [{label, value}]
            templates: [],
            selectedTemplate: '',
            quality: 92,
            qualityOptions: [
                { label: '标准', value: 80 },
                { label: '高清', value: 92 },
                { label: '最高', value: 100 },
            ],
            results: [],
            progress: { active: false, total: 0, success: 0, failure: 0, skipped: 0, percent: 0, message: '' },

            get canStart() {
                return this.photos.length > 0 && this.selectedTemplate && !this.progress.active;
            },

            styleMeta(name) {
                return STYLE_META[name] || { img: '', name: name, desc: '自定义模板' };
            },

            thumbUrl(path) {
                return `/api/v1/file?path=${encodeURIComponent(path)}`;
            },

            async init() {
                this.toast = (msg, type = 'info') => Toastify({
                    text: msg, duration: 3000, gravity: 'top', position: 'center',
                    style: {
                        background: type === 'error' ? '#ef4444' : (type === 'success' ? '#10b981' : '#0ea5e9'),
                        borderRadius: '12px', fontSize: '14px', fontWeight: '500', padding: '12px 24px',
                    }
                }).showToast();

                await this.detectMode();
                await this.loadTemplates();
            },

            async detectMode() {
                try {
                    const res = await fetch('/api/v1/mode');
                    this.cloudMode = !!(await res.json()).cloud;
                } catch (e) { this.cloudMode = false; }
            },

            async loadTemplates() {
                try {
                    const res = await fetch('/api/v1/config');
                    const data = await res.json();
                    this.templates = data.templates || [];
                    // 默认选中：优先“标准水印”，否则第一个
                    this.selectedTemplate = this.templates.includes(data.template_name) ? data.template_name
                        : (this.templates.includes('标准水印') ? '标准水印' : (this.templates[0] || ''));
                } catch (e) {
                    this.toast('加载样式失败: ' + e.message, 'error');
                }
            },

            async uploadFiles(fileList) {
                if (!fileList || !fileList.length) return;
                this.uploading = true;
                try {
                    // 大图先在浏览器内压缩（保留 EXIF），避免超过 Vercel 4.5MB 上限
                    const prepared = [];
                    let compressed = 0;
                    for (const f of Array.from(fileList)) {
                        try {
                            const out = await prepareForUpload(f);
                            if (out !== f) compressed++;
                            prepared.push(out);
                        } catch (e) {
                            this.toast(`${f.name}: ${e.message}`, 'error');
                        }
                    }
                    if (!prepared.length) return;
                    if (compressed) this.toast(`已自动压缩 ${compressed} 张大图`, 'info');

                    const formData = new FormData();
                    if (this.sessionId) formData.append('session_id', this.sessionId);
                    for (const f of prepared) formData.append('files', f);

                    const res = await fetch('/api/v1/upload', { method: 'POST', body: formData });
                    if (!res.ok) throw new Error(`上传失败 ${res.status}`);
                    const data = await res.json();
                    this.sessionId = data.session_id;

                    const existing = new Set(this.photos.map(p => p.value));
                    const added = (data.files || []).filter(f => !existing.has(f.value));
                    this.photos = [...this.photos, ...added];
                    this.toast(`已上传 ${added.length} 张照片`, 'success');
                } catch (e) {
                    this.toast('上传失败: ' + e.message, 'error');
                } finally {
                    this.uploading = false;
                }
            },

            removePhoto(idx) {
                this.photos.splice(idx, 1);
            },

            async generate() {
                this.progress = { active: true, total: this.photos.length, success: 0, failure: 0, skipped: 0, percent: 0, message: '准备处理…' };
                try {
                    const response = await fetch('/api/v1/start_process', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            selectedItems: this.photos.map(p => p.value),
                            session_id: this.sessionId || undefined,
                            quality: this.quality,
                            template_name: this.selectedTemplate || undefined,
                        })
                    });
                    if (!response.ok) throw new Error('服务端错误');

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = '', currentEvent = '';

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buffer += decoder.decode(value, { stream: true });
                        const lines = buffer.split('\n');
                        buffer = lines.pop() || '';
                        for (const line of lines) {
                            if (line.startsWith('event:')) {
                                currentEvent = line.slice(6).trim();
                            } else if (line.startsWith('data:')) {
                                try {
                                    const d = JSON.parse(line.slice(5).trim());
                                    if (d.total !== undefined) this.progress.total = d.total;
                                    if (d.success !== undefined) this.progress.success = d.success;
                                    if (d.failure !== undefined) this.progress.failure = d.failure;
                                    if (d.skipped !== undefined) this.progress.skipped = d.skipped;
                                    if (d.percent !== undefined) this.progress.percent = d.percent;
                                    if (d.message !== undefined) this.progress.message = d.message;
                                    if (currentEvent === 'complete' && d.session_id) this.sessionId = d.session_id;
                                } catch (e) {}
                                currentEvent = '';
                            }
                        }
                    }

                    await new Promise(r => setTimeout(r, 400));
                    await this.loadResults();
                } catch (e) {
                    this.toast('处理失败: ' + e.message, 'error');
                } finally {
                    this.progress.active = false;
                }
            },

            async loadResults() {
                try {
                    const url = this.sessionId
                        ? `/api/v1/file/tree?session_id=${encodeURIComponent(this.sessionId)}`
                        : '/api/v1/file/tree';
                    const res = await fetch(url, { cache: 'no-store' });
                    const data = await res.json();
                    const flat = [];
                    const walk = (nodes) => (nodes || []).forEach(n => {
                        if (n.is_file) flat.push({ label: n.label, value: n.value });
                        if (n.children) walk(n.children);
                    });
                    walk(data.output_files);
                    this.results = flat;
                    this.view = 'done';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (e) {
                    this.toast('读取结果失败: ' + e.message, 'error');
                }
            },

            downloadOne(path) {
                const a = document.createElement('a');
                a.href = `/api/v1/download?path=${encodeURIComponent(path)}`;
                a.download = path.split(/[\\/]/).pop() || 'output.jpg';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            },

            downloadZip() {
                if (!this.sessionId) return;
                window.location.href = `/api/v1/download_zip?session_id=${encodeURIComponent(this.sessionId)}`;
            },

            reset() {
                this.view = 'edit';
                this.photos = [];
                this.results = [];
                this.sessionId = null;
                this.progress = { active: false, total: 0, success: 0, failure: 0, skipped: 0, percent: 0, message: '' };
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },
        }
    }

    // 简单淡入动画
    const style = document.createElement('style');
    style.textContent = '@keyframes fadeIn{from{opacity:0}to{opacity:1}}';
    document.head.appendChild(style);
</script>
</body>
</html>
